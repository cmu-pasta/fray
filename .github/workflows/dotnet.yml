name: dotnet

on:
  push:
    paths:
      - 'dotnet/**'
      - '.github/workflows/dotnet.yml'
  pull_request:
    paths:
      - 'dotnet/**'
      - '.github/workflows/dotnet.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Test
        working-directory: dotnet
        run: dotnet test --nologo
